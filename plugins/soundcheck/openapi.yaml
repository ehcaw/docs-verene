openapi: 3.0.0
info:
  title: Soundcheck API
  version: "1.0.0"
  description: Example Soundcheck API spec used to reproduce a broken-links false positive.
servers:
  - url: https://api.example.com/soundcheck
paths:
  /checks:
    get:
      summary: Get checks
      operationId: getChecks
      tags:
        - Checks
      responses:
        "200":
          description: OK
  /facts:
    get:
      summary: List facts
      operationId: listFacts
      tags:
        - Facts
      responses:
        "200":
          description: OK
  /facts/submit:
    post:
      summary: Submit facts
      operationId: submitFacts
      tags:
        - Facts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                facts:
                  type: array
                  description: Array of fact objects to submit.
                  items:
                    type: object
      responses:
        "200":
          description: OK
  /tracks:
    get:
      summary: List tracks
      operationId: listTracks
      tags:
        - Tracks
      responses:
        "200":
          description: OK
